name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ali@neural-mesh.ai"
          git config user.name "Neural Mesh Bot"
          git push https://AliAhmedMo:${HF_TOKEN}@huggingface.co/spaces/AliAhmedMo/neural-service-mesh-dashboard main --force
