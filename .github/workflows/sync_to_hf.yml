name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git rm --cached data/mesh.db data/mesh.db-wal data/mesh.db-shm 2>/dev/null || true
          git rm --cached -r attached_assets/ 2>/dev/null || true
          git remote add hf https://AliAhmedMo:${HF_TOKEN}@huggingface.co/spaces/AliAhmedMo/neural-service-mesh-dashboard
          git push hf main --force
